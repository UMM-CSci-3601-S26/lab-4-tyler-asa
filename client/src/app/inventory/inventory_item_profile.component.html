<div class="flex-row">
  <div class="flex-1">
    @if (item()) {
    <app-item-card [item]="item()"></app-item-card>
    <br>
    <button mat-raised-button class="add-item-fab" matTooltip="Back to Inventory" matTooltipPosition="left" routerLink="/inventory"
      data-test="addItemButton" [style.y.px] [style.width.px] = 120>
      <mat-icon class="md-24" aria-label="Back to Inventory">arrow_back</mat-icon>
  </button>
    } @else if (error().help !== '') {
    <mat-card class="error-card">
      <mat-card-content>
        <h2>
          {{ error().help }}
        </h2>
        <p>
          {{ error().message }}
        </p>
        <p>
          {{ error().httpResponse }}
        </p>
      </mat-card-content>
      <mat-card-actions>
        <button color="primary" mat-raised-button routerLink="/inventory">
          Back to Inventory List
        </button>
      </mat-card-actions>
    </mat-card>
    } @else {
    <mat-card>
      <mat-card-content>
        <p>Loading Inventory data...</p>
      </mat-card-content>
    </mat-card>
    }
  </div>
</div>
